<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - CodeRise</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-section {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .image-section {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1545239351-ef35f43d514b?q=80&w=1000&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
        }

        h2 { font-size: 28px; margin-bottom: 10px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input {
            width: 100%; padding: 12px;
            border: 1px solid #ddd; border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-signup {
            background-color: #3d5a2d;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        .social-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h2>Get Started Now</h2>

        <form th:action="@{/signup}" th:object="${user}" method="post">
            <div class="input-group">
                <label>Name</label>
                <input type="text" th:field="*{name}" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label>Email address</label>
                <input type="email" th:field="*{email}" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn-signup">Signup</button>
        </form>

        <p>Have an account? <a th:href="@{/login}">Log In</a></p>
    </div>

    <div class="image-section"></div>
</div>

</body>
</html>
